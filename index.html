<script>
    // Цитаты встроены прямо в страницу (см. <script id="quotes-data"> выше) —
    // не зависят от отдельного файла и правил редиректов и работают в любом
    // браузере, включая встроенный браузер Telegram.
    let quotes = [];
    let isLoaded = false;
    let currentQuote = '';
    let currentIndex = -1;

    // Адрес сайта берём от текущего домена — так картинки для истории
    // всегда с того же хоста, откуда открыт Mini App (работает на любом хостинге)
    const SITE_URL = window.location.origin || (location.protocol + '//' + location.host);
    const BOT_URL = 'https://t.me/seneka_1_bot';

    // Инициализация Telegram Mini App (если открыто внутри Telegram)
    const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    const inTelegram = !!(tg && tg.platform && tg.platform !== 'unknown');
    if (tg) {
        try { tg.ready(); tg.expand(); } catch (e) {}
    }

    try {
        quotes = JSON.parse(document.getElementById('quotes-data').textContent)
                     .map(function (s) { return s.trim(); })
                     .filter(function (s) { return s.length > 0; });
        isLoaded = quotes.length > 0;
    } catch (error) {
        console.error('Не удалось разобрать список цитат:', error);
    }

    if (!isLoaded) {
        document.getElementById('quote').textContent =
            'Не удалось загрузить цитаты. Обновите страницу.';
    }

    function showRandomQuote() {
        const quoteElement = document.getElementById('quote');

        if (!isLoaded || quotes.length === 0) {
            quoteElement.textContent = 'Цитаты загружаются...';
            return;
        }

        quoteElement.style.opacity = '0';

        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            currentIndex = randomIndex;
            currentQuote = quotes[randomIndex];
            quoteElement.textContent = currentQuote;
            quoteElement.style.opacity = '1';
        }, 250);
    }

    // Показ всплывающего уведомления
    let toastTimer;
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Текст-подпись для истории / сообщения
    function buildShareText() {
        return '«' + currentQuote + '»\n— Луций Анней Сенека\n\nБольше мудрости: ' + BOT_URL;
    }

    // Копирование в буфер обмена с фолбэком для старых браузеров
    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
        }
        return new Promise((resolve, reject) => {
            try {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                resolve();
            } catch (err) {
                reject(err);
            }
        });
    }

    // Разбивка текста на строки по ширине (для рисования на canvas)
    function wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let line = '';
        for (const word of words) {
            const test = line ? line + ' ' + word : word;
            if (ctx.measureText(test).width > maxWidth && line) {
                lines.push(line);
                line = word;
            } else {
                line = test;
            }
        }
        if (line) lines.push(line);
        return lines;
    }

    // Рисуем вертикальную картинку 1080×1920 с цитатой — для истории Telegram
    function renderStoryCanvas(quote) {
        const W = 1080, H = 1920;
        const canvas = document.createElement('canvas');
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        const serif = 'Georgia, "Times New Roman", serif';
        const ink = '#2c1810', accent = '#8b4513';

        // Фон-пергамент
        ctx.fillStyle = '#f4e4bc';
        ctx.fillRect(0, 0, W, H);

        // Крупная полупрозрачная Σ по центру
        ctx.save();
        ctx.fillStyle = 'rgba(44,24,16,0.05)';
        ctx.font = 'bold 1300px ' + serif;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Σ', W / 2, H / 2 + 30);
        ctx.restore();

        // Рамка + уголки
        ctx.strokeStyle = ink;
        ctx.lineWidth = 4;
        ctx.strokeRect(50, 50, W - 100, H - 100);
        ctx.lineWidth = 8;
        const c = 60;
        function corner(x, y, dx, dy) {
            ctx.beginPath();
            ctx.moveTo(x, y + dy * c);
            ctx.lineTo(x, y);
            ctx.lineTo(x + dx * c, y);
            ctx.stroke();
        }
        corner(50, 50, 1, 1);
        corner(W - 50, 50, -1, 1);
        corner(50, H - 50, 1, -1);
        corner(W - 50, H - 50, -1, -1);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = ink;

        // Заголовок
        ctx.letterSpacing = '14px';
        ctx.font = 'bold 78px ' + serif;
        ctx.fillText('СЕНЕКА', W / 2 + 7, 250);
        ctx.letterSpacing = '0px';
        ctx.globalAlpha = 0.8;
        ctx.font = 'italic 40px ' + serif;
        ctx.fillText('Мудрость стоика', W / 2, 312);
        ctx.globalAlpha = 1;

        // Цитата — подбираем размер шрифта, чтобы вошла в область
        const maxWidth = W - 240;
        const topLimit = 520, bottomLimit = 1470;
        let fontSize = 84, lines = [];
        for (; fontSize >= 38; fontSize -= 2) {
            ctx.font = 'italic ' + fontSize + 'px ' + serif;
            lines = wrapText(ctx, '«' + quote + '»', maxWidth);
            if (lines.length * fontSize * 1.4 <= (bottomLimit - topLimit)) break;
        }
        const lineH = fontSize * 1.4;
        let y = (topLimit + bottomLimit) / 2 - (lines.length - 1) * lineH / 2;
        ctx.font = 'italic ' + fontSize + 'px ' + serif;
        for (const line of lines) {
            ctx.fillText(line, W / 2, y);
            y += lineH;
        }

        // Автор
        ctx.letterSpacing = '6px';
        ctx.font = 'bold 34px ' + serif;
        ctx.fillText('ЛУЦИЙ АННЕЙ СЕНЕКА', W / 2 + 3, 1600);
        ctx.letterSpacing = '0px';

        // Ссылка на бота
        ctx.fillStyle = accent;
        ctx.font = 'bold 42px ' + serif;
        ctx.fillText('@seneka_1_bot', W / 2, 1770);
        ctx.fillStyle = ink;
        ctx.globalAlpha = 0.7;
        ctx.font = '30px ' + serif;
        ctx.fillText('seneka.robotender.ru', W / 2, 1818);
        ctx.globalAlpha = 1;

        return canvas;
    }

    function canvasToBlob(canvas) {
        return new Promise(function (resolve) {
            canvas.toBlob(function (b) { resolve(b); }, 'image/png');
        });
    }

    function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }

    // Поделиться цитатой-картинкой (для истории Telegram) с фолбэками
    async function shareQuote() {
        // Если цитата ещё не выбрана — сначала выбираем случайную
        if (currentIndex < 0 || !currentQuote) {
            if (!isLoaded || quotes.length === 0) {
                showToast('Цитаты ещё загружаются…');
                return;
            }
            currentIndex = Math.floor(Math.random() * quotes.length);
            currentQuote = quotes[currentIndex];
            document.getElementById('quote').textContent = currentQuote;
        }

        const text = buildShareText();

        // === A. Мобильный Telegram — публикация картинки прямо в историю ===
        // shareToStory работает только в мобильном приложении Telegram;
        // в Web/Desktop он есть, но ничего не делает — туда не идём.
        if (inTelegram && tg && (tg.platform === 'ios' || tg.platform === 'android') &&
            typeof tg.shareToStory === 'function' &&
            (!tg.isVersionAtLeast || tg.isVersionAtLeast('8.0'))) {
            try {
                tg.shareToStory(SITE_URL + '/stories/' + currentIndex + '.jpg', {
                    // Подпись к истории: @-упоминание бота кликабельно у всех пользователей
                    text: 'Больше мудрости стоиков — @seneka_1_bot',
                    // Ссылка-виджет на бота (кликабельна; Telegram добавляет её только Premium-подписчикам,
                    //  остальным просто не показывает — ошибки нет)
                    widget_link: { url: BOT_URL, name: 'Сенека' }
                });
                return;
            } catch (err) {
                console.error('shareToStory:', err);
            }
        }

        // === B. Обычный браузер и Web/Desktop Telegram ===
        // (в Web/Desktop Telegram истории из Mini App нет — используем
        //  системный «Поделиться»: уйдёт картинка либо текст со ссылкой на бота)
        // Готовим картинку
        let file = null;
        try {
            const blob = await canvasToBlob(renderStoryCanvas(currentQuote));
            if (blob) file = new File([blob], 'seneca.png', { type: 'image/png' });
        } catch (err) {
            console.error('Не удалось нарисовать картинку:', err);
        }

        // B1) Делимся картинкой: на телефоне откроется меню → Telegram → «В историю»
        if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], text: text });
                return;
            } catch (err) {
                if (err && err.name === 'AbortError') return;
            }
        }

        // B2) Нативное меню «Поделиться» без картинки (текст + ссылка)
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Сенека — мудрость стоика', text: text, url: SITE_URL });
                return;
            } catch (err) {
                if (err && err.name === 'AbortError') return;
            }
        }

        // B3) Фолбэк (десктоп): сохраняем картинку и копируем текст
        if (file) {
            downloadBlob(file, 'seneca.png');
            try { await copyToClipboard(text); } catch (e) {}
            showToast('Картинка сохранена, текст скопирован');
            return;
        }
        try {
            await copyToClipboard(text);
            showToast('Цитата скопирована в буфер обмена');
        } catch (err) {
            showToast('Не удалось поделиться');
        }
    }

    document.getElementById('btn').addEventListener('click', showRandomQuote);
    document.getElementById('shareBtn').addEventListener('click', shareQuote);
</script>
